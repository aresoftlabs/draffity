name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-js:
    name: Lint & test (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm fmt:check
      - run: pnpm lint:js
      - run: pnpm typecheck
      - run: pnpm test
      - name: Coverage gate (TS, floor levels)
        run: pnpm --filter @draffity/ui test:coverage

  lint-and-test-rs:
    name: Lint & test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
      - run: cargo fmt --manifest-path apps/desktop/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path apps/desktop/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/desktop/Cargo.toml --all
      - name: Regenerate TypeScript types from Rust (D-01)
        run: |
          cargo run --manifest-path apps/desktop/Cargo.toml --bin gen-types
          npx prettier --write packages/shared-types/src/generated.ts
      - name: Fail on shared-types drift
        run: |
          if ! git diff --quiet packages/shared-types/src/generated.ts; then
            echo "::error::generated.ts is out of date. Run 'cargo run --manifest-path apps/desktop/Cargo.toml --bin gen-types' locally and commit." >&2
            git --no-pager diff packages/shared-types/src/generated.ts
            exit 1
          fi

  coverage-rs:
    name: Coverage gate (Rust ≥80%)
    needs: [lint-and-test-rs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage with 80% line threshold
        # We measure the surfaces that hold business logic — `domain/` and
        # `services/` — and exclude wiring / boot code (`commands/`,
        # `lib.rs`, `state.rs`), the Tauri capability shim and the tests
        # themselves. Falling below 80% lines fails the job.
        run: |
          cargo llvm-cov \
            --manifest-path apps/desktop/Cargo.toml \
            --lib \
            --ignore-filename-regex 'src/commands/|src/lib\.rs$|src/state\.rs$|src/events\.rs$|src/logging\.rs$|tests/|examples/' \
            --fail-under-lines 80

  validate-epub:
    name: Validate fixture EPUB (epubcheck)
    needs: [lint-and-test-rs]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
      - name: Download epubcheck
        run: |
          curl -fsSL -o epubcheck.zip https://github.com/w3c/epubcheck/releases/download/v5.1.0/epubcheck-5.1.0.zip
          unzip -q epubcheck.zip
          mv epubcheck-5.1.0 epubcheck
      - name: Generate fixture EPUB
        run: |
          cargo run --manifest-path apps/desktop/Cargo.toml --example fixture_epub -- fixture.epub
      - name: Validate with epubcheck
        run: java -jar epubcheck/epubcheck.jar fixture.epub

  e2e:
    name: E2E (Playwright + mock IPC)
    needs: [lint-and-test-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @draffity/ui exec playwright install --with-deps chromium
      - name: Run E2E
        run: pnpm test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/ui/playwright-report
          retention-days: 7

  build-tauri:
    name: Build (${{ matrix.os }})
    # main is fast-forwarded from develop (no PRs to main), so the installer
    # build runs as a smoke check on the push to main. develop stays fast.
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-test-js, lint-and-test-rs, e2e]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop
      - name: Install Tauri Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev
      - run: pnpm install --frozen-lockfile
      - run: pnpm tauri:build
        env:
          CI: 'true'
          # createUpdaterArtifacts is on, so `tauri build` needs the signing
          # key to emit the .sig — same secret the release workflow uses.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: draffity-${{ matrix.os }}
          path: |
            apps/desktop/target/release/bundle/nsis/*-setup.exe
            apps/desktop/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
