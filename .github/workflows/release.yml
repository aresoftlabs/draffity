name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Build & publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ''
          - os: ubuntu-latest
            args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file libxdo-dev \
            libssl-dev libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & publish with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Draffity ${{ github.ref_name }}'
          releaseBody: |
            ## Instalación
            Descargá el instalable de tu sistema (abajo). **Builds sin firmar** (prerelease).
            - **Windows** (`.msi`): si SmartScreen avisa "editor desconocido" → _Más información → Ejecutar de todos modos_.
            - **Linux** (`.AppImage`): `chmod +x <archivo> && ./<archivo>`.

            ## Incluye
            Escritura multi-formato · export EPUB · IA por BYOK (OpenRouter) · **voz 100 % local** (dictado Whisper + lectura Piper, catálogo dinámico de voces).

            > ⚠️ Prerelease: sin firma de código, sin build macOS y sin auto-update todavía (instalación/actualización manual).

            **Cambios:** https://github.com/aresoftlabs/draffity/commits/${{ github.ref_name }}
          releaseDraft: true
          prerelease: true
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Upload installer to R2 + build manifest fragment
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="apps/desktop/target/release/bundle"
          if [ "$RUNNER_OS" = "Windows" ]; then
            KEY="windows-x86_64"
            matches=("$BUNDLE"/nsis/*-setup.exe)
          else
            KEY="linux-x86_64"
            matches=("$BUNDLE"/appimage/*.AppImage)
          fi
          # Fail loud if the build produced no installer, instead of letting a
          # later command choke on an empty path. (Glob-array + nullglob avoids
          # the `ls | head` SIGPIPE-under-pipefail trap.)
          if [ ${#matches[@]} -eq 0 ]; then
            echo "::error::no installer found for $KEY under $BUNDLE" >&2
            exit 1
          fi
          INSTALLER="${matches[0]}"
          BASENAME=$(basename "$INSTALLER")
          echo "Uploading $BASENAME -> s3://bins-draffity/app/$VERSION/"
          aws s3 cp "$INSTALLER" "s3://bins-draffity/app/$VERSION/$BASENAME" --endpoint-url "$R2_ENDPOINT"
          mkdir -p fragments
          node scripts/build-update-manifest.mjs fragment \
            --key "$KEY" \
            --url "https://bins.draffity.com/app/$VERSION/$BASENAME" \
            --sig-file "$INSTALLER.sig" \
            --out "fragments/$KEY.json"

      - name: Upload manifest fragment artifact
        uses: actions/upload-artifact@v4
        with:
          name: update-fragment-${{ runner.os }}
          path: fragments/*.json
          if-no-files-found: error

  manifest:
    name: Assemble & publish update manifest
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download manifest fragments
        uses: actions/download-artifact@v4
        with:
          path: fragments
          pattern: update-fragment-*
          merge-multiple: true

      - name: Build latest.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          node scripts/build-update-manifest.mjs assemble \
            --fragments fragments \
            --version "$VERSION" \
            --notes "Draffity $VERSION" \
            --pub-date "$PUB_DATE" \
            --out latest.json
          echo "----- latest.json -----"
          cat latest.json

      - name: Publish latest.json to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          aws s3 cp latest.json s3://bins-draffity/app/stable/latest.json --endpoint-url "$R2_ENDPOINT"
