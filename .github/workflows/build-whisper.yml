name: build-whisper
# Compila whisper.cpp (cli + server) por plataforma/backend y publica los binarios
# vendor a Cloudflare R2 (https://bins.draffity.com/whisper/<version>/), NO a los
# GitHub Releases del producto. Paths versionados e inmutables.
# - push de tag `whisper-bins-vN` → sube a R2 bajo `whisper/vN/`.
# - workflow_dispatch con `version` → sube a R2 bajo `whisper/<version>/`.
# - workflow_dispatch sin `version` / PR que toque este archivo → smoke (sin subir).
on:
  push:
    tags: ['whisper-bins-*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versión a publicar en R2 (ej. v1). Vacío = smoke build sin subir.'
        required: false
        default: ''
  pull_request:
    paths: ['.github/workflows/build-whisper.yml']

env:
  WHISPER_TAG: v1.8.6 # pineado (Vulkan estable >=1.8.3)

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target_os: macos
            arch: aarch64
            backend: metal
            cmake_flags: -DGGML_METAL=ON -DWHISPER_BUILD_SERVER=ON
          - os: windows-latest
            target_os: windows
            arch: x86_64
            backend: cpu
            cmake_flags: -DWHISPER_BUILD_SERVER=ON
          - os: windows-latest
            target_os: windows
            arch: x86_64
            backend: vulkan
            cmake_flags: -DGGML_VULKAN=ON -DWHISPER_BUILD_SERVER=ON
          - os: ubuntu-latest
            target_os: linux
            arch: x86_64
            backend: cpu
            cmake_flags: -DGGML_BLAS=ON -DWHISPER_BUILD_SERVER=ON
          - os: ubuntu-latest
            target_os: linux
            arch: x86_64
            backend: vulkan
            cmake_flags: -DGGML_VULKAN=ON -DWHISPER_BUILD_SERVER=ON
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout whisper.cpp
        uses: actions/checkout@v4
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ env.WHISPER_TAG }}

      - name: Install Vulkan SDK (Linux)
        if: matrix.target_os == 'linux' && matrix.backend == 'vulkan'
        run: |
          # Full LunarG SDK: brings SPIRV-Headers/SPIRV-Tools/glslang/glslangValidator
          # (the piecemeal libvulkan-dev+glslc is missing those, so ggml-vulkan's
          # find_package(SPIRV-Headers) fails).
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc >/dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update
          sudo apt-get install -y vulkan-sdk

      - name: Install OpenBLAS (Linux)
        if: matrix.target_os == 'linux' && matrix.backend == 'cpu'
        run: |
          sudo apt-get update
          sudo apt-get install -y libopenblas-dev

      - name: Install Vulkan SDK (Windows)
        if: matrix.target_os == 'windows' && matrix.backend == 'vulkan'
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: 1.3.296.0
          cache: true
          stripdown: true

      - name: Install SPIRV-Headers (Windows vulkan, vcpkg)
        if: matrix.target_os == 'windows' && matrix.backend == 'vulkan'
        # The LunarG Windows SDK provides Vulkan + glslc/glslangValidator but no
        # SPIRV-HeadersConfig.cmake (which ggml-vulkan's find_package needs).
        # vcpkg ships that config; the toolchain below makes cmake find it.
        run: C:/vcpkg/vcpkg install spirv-headers:x64-windows

      - name: Configure
        # Windows Vulkan: vcpkg toolchain provides SPIRV-Headers; Vulkan itself
        # is found via VULKAN_SDK (set by the SDK action). No-op elsewhere.
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }} ${{ (matrix.target_os == 'windows' && matrix.backend == 'vulkan') && '-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows' || '' }}

      - name: Build
        # Vulkan limita la paralelización: compilar los shaders generados con
        # -j (todos los cores) agota la RAM del runner (OOM → exit 143).
        run: cmake --build build --config Release --target whisper-cli whisper-server -j ${{ matrix.backend == 'vulkan' && '2' || '' }}

      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist
          BIN=build/bin
          [ -d "$BIN/Release" ] && BIN="$BIN/Release"
          cp "$BIN"/whisper-cli* dist/ 2>/dev/null || cp "$BIN"/main* dist/
          cp "$BIN"/whisper-server* dist/
          find build -maxdepth 3 \( -name '*.dll' -o -name '*.so*' -o -name '*.dylib' \) -exec cp {} dist/ \; 2>/dev/null || true

      - name: Ad-hoc sign (macOS)
        if: matrix.target_os == 'macos'
        run: |
          for f in dist/whisper-cli dist/whisper-server dist/*.dylib; do
            [ -f "$f" ] && codesign -s - -f "$f" || true
          done

      - name: Package
        shell: bash
        run: |
          NAME="whisper-${{ matrix.target_os }}-${{ matrix.arch }}-${{ matrix.backend }}"
          if [ "${{ matrix.target_os }}" = "windows" ]; then
            cd dist && 7z a "../$NAME.zip" ./* && cd ..
            certutil -hashfile "$NAME.zip" SHA256 > "$NAME.zip.sha256"
          else
            tar -C dist -czf "$NAME.tar.gz" .
            shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          fi

      - name: Upload artifact (smoke)
        uses: actions/upload-artifact@v4
        with:
          name: whisper-${{ matrix.target_os }}-${{ matrix.arch }}-${{ matrix.backend }}
          path: |
            *.zip
            *.tar.gz
            *.sha256

      - name: Publish to R2 (vendor binaries)
        # Vendor binaries → Cloudflare R2 (bins.draffity.com), no a los Releases del
        # producto. Path versionado e inmutable: whisper/<version>/. La AWS CLI v2
        # viene preinstalada en los runners de GitHub (Linux/Windows/macOS).
        if: github.event.inputs.version != '' || startsWith(github.ref, 'refs/tags/whisper-bins-')
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION="${GITHUB_REF_NAME#whisper-bins-}"
          echo "Publishing to s3://bins-draffity/whisper/$VERSION/"
          for f in *.zip *.tar.gz *.zip.sha256 *.tar.gz.sha256; do
            [ -f "$f" ] || continue
            echo "  -> $f"
            aws s3 cp "$f" "s3://bins-draffity/whisper/$VERSION/$f" --endpoint-url "$R2_ENDPOINT"
          done
